<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Move US: Adaptive Sports and Recreation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f0f4f8;
      color: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #4a5568;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 4px;
      background-color: #2b6cb0;
      margin: 1.5rem auto;
      border-radius: 2px;
    }

    p {
      font-size: 1.1rem;
      color: #4a5568;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Let's Move US</h1>
    <h2>Adaptive Sports and Recreation</h2>
    <div class="divider"></div>
    <p>We're working on something great. Our site is currently under construction — check back soon!</p>
  </div>
</body>
</html>
